name: Update Talks

on:
  # Schedule daily updates (offset from metrics workflow at 00:00)
  schedule: [{cron: "0 1 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:

jobs:
  update-talks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Fetch repos and regenerate talks table
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 << 'EOF'
          import json, re, os, time, urllib.request, urllib.error

          token = os.environ.get('GH_TOKEN', '')
          headers = {
              'Accept': 'application/vnd.github.v3+json',
              'User-Agent': 'github-actions',
          }
          if token:
              headers['Authorization'] = f'token {token}'

          # Retry transient errors (429/5xx/network). On 401 the token is bad,
          # so fall back to an anonymous request (public data needs no auth).
          _RETRY_STATUS = {429, 500, 502, 503, 504}

          def fetch_json(url, *, data=None, method=None, retries=4):
              auth = dict(headers)
              for attempt in range(retries):
                  req = urllib.request.Request(url, data=data, headers=auth, method=method)
                  try:
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          body = resp.read()
                          return json.loads(body) if body else None
                  except urllib.error.HTTPError as e:
                      if e.code == 401 and 'Authorization' in auth:
                          print('  WARN 401 Unauthorized; retrying anonymously.')
                          auth.pop('Authorization', None)
                          continue
                      if e.code in _RETRY_STATUS and attempt < retries - 1:
                          wait = 2 ** attempt
                          print(f'  WARN HTTP {e.code}; retry in {wait}s')
                          time.sleep(wait)
                          continue
                      raise
                  except urllib.error.URLError as e:
                      if attempt < retries - 1:
                          wait = 2 ** attempt
                          print(f'  WARN {e}; retry in {wait}s')
                          time.sleep(wait)
                          continue
                      raise

          # Fetch all repos, sorted by creation date descending
          repos = []
          page = 1
          while True:
              url = (
                  f'https://api.github.com/users/patbaumgartner/repos'
                  f'?per_page=100&sort=created&direction=desc&page={page}'
              )
              data = fetch_json(url)
              if not data:
                  break
              repos.extend(data)
              if len(data) < 100:
                  break
              page += 1

          # Keep only talk-* and deep-dive-* repos
          talks = [r for r in repos if r['name'].startswith(('talk-', 'deep-dive-'))]

          def parse_description(desc, name):
              """Return (display_title, key_topics) from a repo description."""
              if not desc:
                  title = (
                      name.replace('talk-', '')
                          .replace('deep-dive-', '')
                          .replace('-', ' ')
                          .title()
                  )
                  return title, ''
              for sep in ['! ', '. ']:
                  idx = desc.find(sep)
                  if idx != -1:
                      title = desc[:idx]
                      rest = desc[idx + len(sep):]
                      for end in ['. ', '! ', '? ']:
                          end_idx = rest.find(end)
                          if end_idx != -1:
                              topics = rest[:end_idx]
                              break
                      else:
                          topics = rest.rstrip('.')
                      return title, topics
              return desc, ''

          # ── Conference extraction from commit messages ──────────────────────
          _PREFIX = re.compile(
              r'^(?:update(?:d|s)?(?:\s+slides?)?'
              r'|add\s+slides?'                    # 'Add slides for JAX 2026'
              r'|initial\s+(?:commit|version|release)'
              r'|first\s+(?:version|commit)'
              r'|adjusted|prepared)\s+(?:for\s+)?',
              re.IGNORECASE,
          )
          _SUFFIX = re.compile(
              r'\s+(?:updates?|edition|version|release)\s*$', re.IGNORECASE
          )
          _SKIP = re.compile(
              r'^(?:initial\s+commit[\s\W]*$'        # bare 'Initial commit' (no conference)
              r'|add\s+(?!slides?\s)'               # skip 'add X' but NOT 'add slides for Y'
              r'|chore:|fix:|feat:|merge\s+'
              r'|update\s+readme|update\s+github|bump\s+'
              r'|renamed?\s+|removed?\s+|deleted?\s+|created?\s+file)',
              re.IGNORECASE,
          )

          def extract_conference(message):
              line = message.split('\n')[0].strip()
              if _SKIP.match(line):
                  return None
              cleaned = _PREFIX.sub('', line).strip()
              cleaned = re.sub(r'^for\s+', '', cleaned, flags=re.IGNORECASE).strip()
              cleaned = _SUFFIX.sub('', cleaned).strip()
              if not cleaned or len(cleaned) > 60:
                  return None
              # Full 4-digit year present → keep as-is
              if re.search(r'\b20\d{2}\b', cleaned):
                  return cleaned
              # 2-digit year appended to name (e.g. JAX23, Heapcon23, W-JAX23)
              m = re.search(r'([A-Za-z][\w\-\.\/]*?)(\d{2})$', cleaned)
              if m and 20 <= int(m.group(2)) <= 30:
                  return m.group(1).rstrip(' -') + ' 20' + m.group(2)
              return None

          def get_conferences(repo_name):
              url = (
                  f'https://api.github.com/repos/patbaumgartner/'
                  f'{repo_name}/commits?per_page=50'
              )
              try:
                  commits = fetch_json(url) or []
              except Exception as e:
                  print(f'  WARN {repo_name} commits: {e}')
                  return []
              seen = {}
              for c in commits:
                  conf_raw = extract_conference(c['commit']['message'])
                  if conf_raw:
                      # Split 'Conf A 2022 and Conf B 2022' into separate entries
                      parts = re.split(r'\s+and\s+', conf_raw, flags=re.IGNORECASE)
                      for conf in parts:
                          conf = conf.strip()
                          if not conf or not re.search(r'20\d{2}', conf):
                              continue
                          # Deduplicate by (normalised name, year)
                          m_yr = re.search(r'(20\d{2})', conf)
                          year_part = m_yr.group(1) if m_yr else ''
                          name_part = re.sub(r'\s+', '', conf).lower()
                          key = f'{name_part}_{year_part}'
                          seen.setdefault(key, conf)
              # Sort by year, then alphabetically within the same year
              def _year(s):
                  m = re.search(r'20(\d{2})', s)
                  return int(m.group(1)) if m else 0
              return sorted(seen.values(), key=lambda s: (_year(s), s.lower()))

          # ── Build table ─────────────────────────────────────────────────────
          rows = [
              '| # | Talk / Deep Dive | Key Topics | Presented at |',
              '|---|-----------------|------------|--------------|',
          ]
          # Collect all data first so we can sort before numbering
          talk_rows = []
          for r in talks:
              title, topics = parse_description(r.get('description') or '', r['name'])
              url = r['html_url']
              conferences = get_conferences(r['name'])
              conf_str = ', '.join(conferences)
              # Max year the talk was last delivered (0 if never delivered)
              def _max_year(confs):
                  years = [int(m.group(1)) for c in confs
                           for m in [re.search(r'(20\d{2})', c)] if m]
                  return max(years) if years else 0
              last_year = _max_year(conferences)
              talk_rows.append((last_year, len(conferences), title, url, topics, conf_str))

          # Sort: most-recent year first, then most deliveries first
          talk_rows.sort(key=lambda t: (t[0], t[1]), reverse=True)

          for i, (_, _, title, url, topics, conf_str) in enumerate(talk_rows, 1):
              rows.append(f'| {i} | [{title}]({url}) | {topics} | {conf_str} |')

          table = '\n'.join(rows)

          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()

          new_content = re.sub(
              r'<!-- TALKS_START -->.*?<!-- TALKS_END -->',
              f'<!-- TALKS_START -->\n{table}\n<!-- TALKS_END -->',
              content,
              flags=re.DOTALL,
          )

          if new_content == content:
              print('No changes detected.')
          else:
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(new_content)
              print('README.md updated.')
          EOF

      - name: Sync GitHub topics on talk and deep-dive repos
        # Requires a PAT (classic) with public_repo scope stored as TOPICS_TOKEN.
        # Create one at https://github.com/settings/tokens and add it as a repo secret.
        # Prints a WARN for each repo when the secret is absent; does not fail the job.
        env:
          GH_TOKEN: ${{ secrets.TOPICS_TOKEN }}
        run: |
          python3 << 'EOF'
          import json, os, time, urllib.request, urllib.error

          token = os.environ.get('GH_TOKEN', '')
          headers = {
              'Accept': 'application/vnd.github.v3+json',
              'User-Agent': 'github-actions',
              'Content-Type': 'application/json',
          }
          if token:
              headers['Authorization'] = f'token {token}'

          # Retry transient errors (429/5xx/network) with exponential backoff.
          # On 401 the token is bad/expired, so fall back to an anonymous request:
          # listing public repos needs no auth, and topic writes then degrade to a
          # per-repo WARN instead of aborting the whole job.
          _RETRY_STATUS = {429, 500, 502, 503, 504}

          def fetch_json(url, *, data=None, method=None, retries=4):
              auth = dict(headers)
              for attempt in range(retries):
                  req = urllib.request.Request(url, data=data, headers=auth, method=method)
                  try:
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          body = resp.read()
                          return json.loads(body) if body else None
                  except urllib.error.HTTPError as e:
                      if e.code == 401 and 'Authorization' in auth:
                          print('  WARN 401 Unauthorized; retrying anonymously.')
                          auth.pop('Authorization', None)
                          continue
                      if e.code in _RETRY_STATUS and attempt < retries - 1:
                          wait = 2 ** attempt
                          print(f'  WARN HTTP {e.code}; retry in {wait}s')
                          time.sleep(wait)
                          continue
                      raise
                  except urllib.error.URLError as e:
                      if attempt < retries - 1:
                          wait = 2 ** attempt
                          print(f'  WARN {e}; retry in {wait}s')
                          time.sleep(wait)
                          continue
                      raise

          # Rules: (substring-in-name → extra topics to add)
          EXTRA = [
              ('spring-ai',     {'spring-ai', 'llm'}),
              ('intelligent',   {'spring-ai', 'llm'}),
              ('embabel',       {'agentic-ai', 'embabel'}),
              ('buildpacks',    {'buildpacks', 'cloud-native', 'paketo'}),
              ('observabilit',  {'observability', 'opentelemetry', 'micrometer'}),
              ('quarkus',       {'quarkus', 'graalvm'}),
              ('graalvm',       {'graalvm', 'native-image'}),
              ('modulith',      {'spring-modulith', 'modular-monolith'}),
              ('green',         {'green-software', 'sustainability'}),
              ('aot',           {'spring-aot', 'graalvm'}),
              ('lean',          {'performance', 'cloud-native'}),
              ('cloud',         {'cloud-native'}),
          ]

          def compute_topics(name):
              topics = {'java', 'spring-boot'}
              if name.startswith('talk-'):
                  topics.add('conference-talk')
              if name.startswith('deep-dive-'):
                  topics.update({'deep-dive', 'workshop'})
              for keyword, extra in EXTRA:
                  if keyword in name:
                      topics.update(extra)
              return sorted(topics)

          # Fetch all repos
          repos, page = [], 1
          while True:
              url = (
                  f'https://api.github.com/users/patbaumgartner/repos'
                  f'?per_page=100&sort=created&direction=desc&page={page}'
              )
              data = fetch_json(url)
              if not data:
                  break
              repos.extend(data)
              if len(data) < 100:
                  break
              page += 1

          talks = [r for r in repos if r['name'].startswith(('talk-', 'deep-dive-'))]

          for r in talks:
              name = r['name']
              topics = compute_topics(name)
              payload = json.dumps({'names': topics}).encode()
              url = f'https://api.github.com/repos/patbaumgartner/{name}/topics'
              try:
                  fetch_json(url, data=payload, method='PUT')
                  print(f'  {name}: {topics}')
              except Exception as e:
                  print(f'  WARN {name}: {e}')
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md \
            && echo "Nothing to commit." \
            || (git add README.md \
                && git commit -m "chore: update talks list [skip ci]" \
                && git push)
